services:
  mysql:
    image: mysql:8.0
    container_name: etl-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-etl}
      MYSQL_USER: ${DB_USER:-etluser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-etlpass}
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: etl-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-etl}
      DB_USER: ${DB_USER:-etluser}
      DB_PASSWORD: ${DB_PASSWORD:-etlpass}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 8080

  ui:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: etl-ui
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${UI_PORT:-80}:80"

volumes:
  mysql_data:
