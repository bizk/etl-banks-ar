services:

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: etl-api
    restart: unless-stopped
    # Reuse the existing MySQL container, which publishes port 3306 on the host.
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-etl}
      DB_USER: ${DB_USER:-etluser}
      DB_PASSWORD: ${DB_PASSWORD:-etlpass}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 8080

  ui:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: etl-ui
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
    ports:
      - "${UI_PORT:-80}:80"
